<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Wallet</title>
    <script src="https://www.paypal.com/sdk/js?client-id=ASJbZBJ7IRxlB15bZhS4KbFu1MbiE2aU_9AjPSXCLPdYV6Cops6hkAWRrnJjEZamWG7YRturVr8CPv_K&currency=EUR"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --gold: #c1a400; --text: #eaeaea; --red: #ff4d4d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #2b3139; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; font-size: 15px; }
        .hidden { display: none; }
        .section { background: #2b3139; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #383f47; }
        label { display: block; text-align: left; font-size: 11px; color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        #balance { font-size: 38px; font-weight: bold; color: #02c076; margin: 15px 0; }
        .logout { cursor:pointer; color: var(--red); font-size: 12px; font-weight: bold; padding: 5px; }
    </style>
</head>
<body>

<div id="auth-ui" class="card">
    <h2 id="title">Accedi</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="handleAuth()">CONTINUA</button>
    <p onclick="toggleAuth()" style="font-size: 13px; color: var(--gold); cursor: pointer; margin-top: 15px;">Crea un account</p>
</div>

<div id="dash-ui" class="card hidden">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div id="u-display" style="font-weight: bold; color: var(--gold);"></div>
        <span onclick="logout()" class="logout">ESCI</span>
    </div>

    <div style="font-size: 11px; color: #848e9c; margin-top: 20px;">IL TUO SALDO</div>
    <div id="balance">0,00 €</div>

    <div class="section">
        <label>DEPOSITA (€)</label>
        <input type="number" id="amount" value="10.00" min="1.00">
        <div id="paypal-button-container" style="margin-top: 10px;"></div>
    </div>

    <div class="section" style="border-color: #ff4d4d44;">
        <label style="color: var(--red);">PRELEVA (Comm. 5%)</label>
        <input type="email" id="w-email" placeholder="Email PayPal">
        <input type="number" id="w-amount" placeholder="Importo da scalare" min="1.00">
        <button id="btn-withdraw" onclick="handleWithdraw()" style="background: var(--red); color: white; margin-top: 5px;">RICHIEDI PRELIEVO</button>
    </div>

    <div id="status" style="font-size: 12px; color: #848e9c; margin-top: 15px;">Pronto</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://fir-49b97-default-rtdb.europe-west1.firebasedatabase.app/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let mode = "LOGIN", currentUser = null, currentPayKey = null;

    window.toggleAuth = () => { 
        mode = mode === "LOGIN" ? "SIGNUP" : "LOGIN"; 
        document.getElementById("title").innerText = mode; 
    };

    window.logout = () => {
        if (currentUser) off(ref(db, `utenti/${currentUser}/saldo`));
        currentUser = null;
        document.getElementById("dash-ui").classList.add("hidden");
        document.getElementById("auth-ui").classList.remove("hidden");
        document.getElementById("paypal-button-container").innerHTML = "";
    };

    window.handleAuth = () => {
        const u = document.getElementById("user").value.trim().toLowerCase();
        const p = document.getElementById("pass").value;
        if(!u || !p) return alert("Inserisci i dati");

        const authRef = push(ref(db, 'auth_requests'), { Username: u, Password: p, Type: mode, Stato: "PENDING" });
        onValue(authRef, snap => {
            const data = snap.val();
            if(data?.Stato === "SUCCESS") { 
                currentUser = u; 
                off(authRef);
                showDash(); 
            } else if(data?.Stato === "FAIL") {
                alert("Errore: " + data.Messaggio);
                off(authRef);
            }
        });
    };

    // --- LOGICA PRELIEVO CON AVVISO COMMISSIONE ---
    window.handleWithdraw = () => {
        const email = document.getElementById("w-email").value;
        const val = parseFloat(document.getElementById("w-amount").value);
        
        if(!email.includes("@") || isNaN(val) || val < 1) return alert("Dati non validi");

        // Calcolo anteprima commissione (5%)
        const comm = (val * 0.05).toFixed(2);
        const netto = (val - comm).toFixed(2);

        if(!confirm(`Confermi il prelievo?\nScalati dal saldo: ${val}€\nRicevuti su PayPal: ${netto}€\nCommissione: ${comm}€`)) return;

        document.getElementById("status").innerText = "Invio richiesta prelievo...";
        const wRef = push(ref(db, 'prelievi'), { UserId: currentUser, EmailPayPal: email, Importo: val, Stato: "PENDING" });
        
        onValue(wRef, snap => {
            const res = snap.val();
            if(res?.Stato === "SUCCESS") { 
                alert("Prelievo inviato con successo!"); 
                document.getElementById("w-amount").value = "";
                off(wRef);
            } else if(res?.Stato === "ERROR") {
                alert("Errore: " + res.Messaggio);
                off(wRef);
            }
        });
    };

    function showDash() {
        document.getElementById("auth-ui").classList.add("hidden");
        document.getElementById("dash-ui").classList.remove("hidden");
        document.getElementById("u-display").innerText = currentUser.toUpperCase();

        onValue(ref(db, `utenti/${currentUser}/saldo`), s => {
            const saldo = s.val() || 0;
            document.getElementById("balance").innerText = saldo.toLocaleString('it-IT', {style:'currency', currency:'EUR'});
        });

        paypal.Buttons({
            createOrder: () => {
                const val = parseFloat(document.getElementById("amount").value);
                const pRef = push(ref(db, 'pagamenti'), { Importo: val, UserId: currentUser, Stato: "PENDING" });
                currentPayKey = pRef.key;
                return new Promise((resolve) => {
                    onValue(pRef, snap => {
                        const data = snap.val();
                        if(data?.Stato === "READY") { off(pRef); resolve(data.OrderId); }
                    });
                });
            },
            onApprove: () => update(ref(db, 'pagamenti/' + currentPayKey), { Stato: "TO_CAPTURE" }),
            onCancel: () => document.getElementById("status").innerText = "Annullato."
        }).render('#paypal-button-container');
    }
</script>
</body>
</html>
